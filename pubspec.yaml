    - assets/images/icons/category_shopping.png
    - assets/images/icons/category_culture.png
    - assets/images/icons/category_education.png
    - assets/images/icons/category_event.png
    - assets/images/icons/category_fashion.png
    - assets/images/icons/category_home.png
    - assets/images/icons/category_mart.png
    - assets/images/icons/category_pet.png
    - assets/images/icons/category_saving.png
    - assets/images/icons/category_tax.png
    - assets/images/icons/pencil_line.png
    - assets/images/icons/arrow_square_downright.png
    - assets/images/icons/arrow_square_upright.png

    - assets/images/planet_icon/MERCURY.png
    - assets/images/planet_icon/VENUS.png
