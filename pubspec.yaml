    - assets/images/type_icon/type_food.png

    - assets/
    - assets/tessdata/

  # 폰트 등록
  fonts:
    - family: Soyo
      fonts:
        - asset: assets/fonts/SOYO Maple Regular.ttf

    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.ttf
          weight: 400
        - asset: assets/fonts/Pretendard-Medium.ttf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.ttf
